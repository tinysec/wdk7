name: wdk7
description: Detect, download, cache, and expose Windows Driver Kit 7.1.

inputs:
  root:
    description: Explicit WDK7 root. Overrides environment probing when valid.
    default: ""
  download-url:
    description: WDK7 ISO URL. Defaults to the official Microsoft WDK 7.1 ISO.
    default: "https://download.microsoft.com/download/4/A/2/4A25C7D5-EFBE-4182-B6A9-AE6850409A78/GRMWDK_EN_7600_1.ISO"

outputs:
  found:
    description: true when a usable WDK7 tree was found or prepared.
  root:
    description: Resolved WDK7 root.
  source:
    description: "Resolution source: input, environment, cache, default, or download."
  cache-hit:
    description: true when an existing cached WDK7 tree was reused.
  toolchain-file:
    description: Absolute path to the bundled CMake WDK7 toolchain file.
  cmake-generator:
    description: Recommended CMake generator for the WDK7 toolchain.

runs:
  using: node24
  main: dist/index.js
