name: self-test

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  detect:
    runs-on: windows-2025
    steps:
      - name: create fake wdk7
        id: fake
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "fake-wdk7"
          $hostBin = Join-Path $root "bin\x86"
          $x86Bin = Join-Path $root "bin\x86\x86"
          $amd64Bin = Join-Path $root "bin\x86\amd64"
          New-Item -ItemType Directory -Force -Path `
            (Join-Path $root "inc\api"), `
            (Join-Path $root "inc\ddk"), `
            $x86Bin, `
            $amd64Bin, `
            $hostBin | Out-Null

          foreach ($file in @(
            (Join-Path $root "bin\setenv.bat"),
            (Join-Path $x86Bin "cl.exe"),
            (Join-Path $x86Bin "link.exe"),
            (Join-Path $amd64Bin "cl.exe"),
            (Join-Path $amd64Bin "link.exe"),
            (Join-Path $hostBin "nmake.exe"),
            (Join-Path $hostBin "rc.exe")
          )) {
            New-Item -ItemType File -Force -Path $file | Out-Null
          }

          "root=$root" >> $env:GITHUB_OUTPUT

      - name: setup wdk7
        id: wdk7
        uses: tinysec/wdk7@master
        with:
          root: ${{ steps.fake.outputs.root }}

      - name: show outputs
        shell: powershell
        run: |
          "found=${{ steps.wdk7.outputs.found }}"
          "root=${{ steps.wdk7.outputs.root }}"
          "source=${{ steps.wdk7.outputs.source }}"
          "cache-hit=${{ steps.wdk7.outputs.cache-hit }}"
          "toolchain-file=${{ steps.wdk7.outputs.toolchain-file }}"
          "ddkbuild-cmd=${{ steps.wdk7.outputs.ddkbuild-cmd }}"
          if (-not (Test-Path -LiteralPath "${{ steps.wdk7.outputs.ddkbuild-cmd }}")) {
            throw "Bundled ddkbuild.cmd was not found."
          }
